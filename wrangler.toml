name = "leonard"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "leonard-db"
database_id = "" # Will be filled after `wrangler d1 create leonard-db`

# Environment variables are set via Cloudflare dashboard or wrangler secret
# GEMINI_API_KEY, GOOGLE_PLACES_API_KEY, FIREBASE_PROJECT_ID

[vars]
FIREBASE_PROJECT_ID = "leonardaccess-233f8"
